repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: doxygen-guard
        name: doxygen-guard
        entry: .venv/bin/doxygen-guard
        language: system
        types: [python]
        files: ^src/

      - id: pytest
        name: pytest
        entry: .venv/bin/pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
