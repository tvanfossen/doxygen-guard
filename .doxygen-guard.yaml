output_dir: docs/generated/

validate:
  exclude:
    - "^tests/"
    - "^examples/"
    - "^\\.venv/"
  version_gate:
    current_version: "auto:git"
    version_field: "Min Version"

trace:
  format: plantuml
  participant_field: "Subsystem"
  options:
    autonumber: true

impact:
  requirements:
    file: docs/requirements.csv
    id_column: "Req ID"
    name_column: "Name"
    format: csv
